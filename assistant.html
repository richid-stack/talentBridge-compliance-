<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBC Assistant - TalentBridge Compliance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0d14;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle global network background */
        .network-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #0f1626 0%, #0a0d14 70%);
            z-index: -2;
            pointer-events: none;
        }
        .network-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(10,13,20,0.85), rgba(10,13,20,0.9));
            z-index: -1;
        }
        .network-lines {
            position: absolute;
            inset: 0;
            opacity: 0.07;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><filter id="glow"><feGaussianBlur stdDeviation="1.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="10%" cy="20%" r="2" fill="%23ffd700" filter="url(%23glow)"/><circle cx="30%" cy="60%" r="1.5" fill="%23ffd700" filter="url(%23glow)"/><circle cx="70%" cy="40%" r="2" fill="%23ffd700" filter="url(%23glow)"/><circle cx="85%" cy="75%" r="1.8" fill="%23ffd700" filter="url(%23glow)"/><line x1="10%" y1="20%" x2="30%" y2="60%" stroke="%23ffd700" stroke-width="0.5" opacity="0.4"/><line x1="30%" y1="60%" x2="70%" y2="40%" stroke="%23ffd700" stroke-width="0.5" opacity="0.4"/><line x1="70%" y1="40%" x2="85%" y2="75%" stroke="%23ffd700" stroke-width="0.5" opacity="0.4"/></svg>') repeat;
            animation: networkPulse 25s infinite alternate ease-in-out;
        }
        @keyframes networkPulse {
            0% { opacity: 0.05; transform: scale(1.02); }
            100% { opacity: 0.12; transform: scale(1.05); }
        }

        h1 {
            text-align: center;
            color: #ffd700;
            margin: 50px 0 10px;
            font-size: 2.6rem;
            letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(255,215,0,0.35);
        }

        .subtitle {
            text-align: center;
            opacity: 0.75;
            max-width: 820px;
            margin: 0 auto 50px;
            line-height: 1.7;
            font-size: 1.1rem;
        }

        #logo {
            display: block;
            width: 160px;
            margin: 40px auto 30px;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
            border-radius: 50%;
        }

        #chat-container {
            max-width: 920px;
            margin: 0 auto 80px;
            background: rgba(18,24,38,0.88);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7), inset 0 0 25px rgba(255,215,0,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,215,0,0.18);
        }

        #messages {
            height: 540px;
            overflow-y: auto;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(26,34,53,0.65);
            border-radius: 14px;
            scrollbar-width: thin;
            scrollbar-color: #ffd700 #1a2235;
        }

        #messages::-webkit-scrollbar {
            width: 8px;
        }

        #messages::-webkit-scrollbar-track {
            background: #1a2235;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 4px;
        }

        .message {
            margin: 14px 0;
            padding: 16px 22px;
            border-radius: 22px;
            max-width: 82%;
            line-height: 1.55;
            animation: fadeInUp 0.5s ease-out;
            transition: transform 0.25s ease;
        }

        .user {
            background: linear-gradient(135deg, #ffd700, #ffcc00);
            color: #0f1626;
            margin-left: auto;
            border-bottom-right-radius: 6px;
        }

        .bot {
            background: linear-gradient(135deg, #00ff9d, #00d68f);
            color: #0f1626;
            margin-right: auto;
            border-bottom-left-radius: 6px;
        }

        .thinking {
            color: #aaa;
            font-style: italic;
            animation: pulseText 1.8s infinite;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 1; }
        }

        #input-area {
            display: flex;
            background: #1a2235;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255,215,0,0.22);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        #user-input {
            flex: 1;
            padding: 18px 24px;
            border: none;
            background: transparent;
            color: white;
            font-size: 1.05rem;
            outline: none;
        }

        button {
            padding: 0 32px;
            background: linear-gradient(135deg, #ffd700, #ffcc00);
            color: #0f1626;
            border: none;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.35s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #ffea80, #ffdb4d);
            transform: scale(1.06);
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 40px 20px;
            opacity: 0.85;
            font-size: 1rem;
            border-top: 1px solid rgba(255,215,0,0.15);
        }

        .social-icons {
            margin: 20px 0;
        }

        .social-icons a {
            color: #ffd700;
            margin: 0 18px;
            font-size: 1.8rem;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            color: #ffea80;
            transform: scale(1.2);
        }

        a { color: #ffd700; text-decoration: none; transition: color 0.3s; }
        a:hover { color: #ffea80; }
    </style>
</head>
<body>

    <div class="network-bg">
        <div class="network-overlay"></div>
        <div class="network-lines"></div>
    </div>

    <img id="logo" src="https://via.placeholder.com/160x160/000/ffd700?text=TBC" alt="TalentBridge Compliance Logo" />

    <h1>TBC Assistant</h1>
    <p class="subtitle">
        Live AI guidance on EU AI Act compliance, Compliance Passports, ethical sourcing, and connecting certified African talent to global remote jobs.
    </p>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input id="user-input" placeholder="Ask about certification, EU AI Act, GDPR, ethical sourcing, or remote opportunities..." autocomplete="off" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <p class="footer">
        TalentBridge Compliance © 2026 — The Trust Layer for Global AI Hiring  
        <br><br>
        Contact: +233 530 105 254 | talentbridgecompliance.carrd.co  
        <br><br>
        <div class="social-icons">
            <a href="https://www.linkedin.com/company/talentbridge-africa/" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://x.com/Chiddymens" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.tiktok.com/@talentbridge.afrca" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61578497786303" target="_blank"><i class="fab fa-facebook"></i></a>
        </div>
    </p>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('user-input');

        function addMessage(text, isUser = false) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.innerHTML = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function typeMessage(text, element, speed = 30) {
            let i = 0;
            element.innerHTML = '';
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } else {
                    clearInterval(interval);
                }
            }, speed + Math.random() * 15);
        }

        async function sendMessage() {
            const userText = input.value.trim();
            if (!userText) return;

            addMessage(userText, true);
            input.value = '';

            const thinking = document.createElement('div');
            thinking.className = 'message bot thinking';
            thinking.textContent = 'Thinking...';
            messagesDiv.appendChild(thinking);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            await new Promise(r => setTimeout(r, 800 + Math.random() * 600));

            let reply = "Hi from TBC Assistant. How can I assist with Compliance Passports, EU AI Act compliance, ethical sourcing, or connecting certified African talent to global remote jobs?";

            const lower = userText.toLowerCase();

            if (lower.includes("founder") || lower.includes("who started") || lower.includes("who created") || lower.includes("richard") || lower.includes("mensah")) {
                reply = "TalentBridge Compliance was founded by Richard Mensah in Accra, Ghana — a student at the University of Ghana with deep roots in GIPS Procurement and Supply Chain Ethics.";
            } else if (lower.includes("eu ai act") || lower.includes("high-risk") || lower.includes("article 26")) {
                reply = "EU AI Act high-risk obligations enforced since August 2, 2026. Article 26 requires meaningful human oversight: trained overseers, explainability, intervention/override/stop capability. Fines up to €35M or 7% turnover. TBC certifies talent for these exact requirements.";
            } else if (lower.includes("gdpr") || lower.includes("pii") || lower.includes("data protection")) {
                reply = "GDPR demands lawful processing, data minimization, security, and rights to access/erasure. For AI: strict PII handling and international transfer safeguards. TBC audits this in every workflow.";
            } else if (lower.includes("passport") || lower.includes("certif") || lower.includes("audit")) {
                reply = "Our Compliance Passport verifies ethical sourcing, provenance, GDPR/PII handling, bias awareness, and interaction logs — unlocking global remote opportunities for certified professionals.";
            } else if (lower.includes("africa") || lower.includes("talent") || lower.includes("remote jobs")) {
                reply = "We certify Africa's top AI professionals and connect them to international remote roles — cost-effective, compliant, and ready for high-risk workflows.";
            } else if (lower.includes("gips") || lower.includes("ethical sourcing")) {
                reply = "TBC applies GIPS-level ethical procurement — anti-corruption, transparency, no modern slavery — to every certified professional.";
            } else if (lower.includes("university") || lower.includes("ghana") || lower.includes("student")) {
                reply = "The founder is a student at the University of Ghana, combining academic insight with practical procurement ethics from GIPS.";
            }

            thinking.remove();
            const botMsg = document.createElement('div');
            botMsg.className = 'message bot';
            messagesDiv.appendChild(botMsg);
            typeMessage(reply, botMsg, 28);
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Smooth welcome
        setTimeout(() => {
            addMessage("Hi from TBC Assistant. How can I help with Compliance Passports, EU AI Act compliance, ethical sourcing, or connecting certified African talent to global remote jobs today?", false);
        }, 800);
    </script>

</body>
</html>
