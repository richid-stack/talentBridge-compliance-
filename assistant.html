<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBC Assistant - TalentBridge Compliance</title>
    <style>
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#0a0d14; color:white; padding:20px; }
        h1 { text-align:center; color:gold; margin:40px 0 10px; }
        .subtitle { text-align:center; opacity:0.8; margin-bottom:30px; max-width:800px; margin-left:auto; margin-right:auto; }
        #chat-container { max-width:900px; margin:0 auto; background:#121826; border-radius:15px; padding:20px; box-shadow:0 0 30px rgba(255,215,0,0.3); }
        #messages { height:500px; overflow-y:auto; margin-bottom:20px; padding:10px; background:#1a2235; border-radius:10px; }
        .message { margin:10px 0; padding:12px 18px; border-radius:18px; max-width:80%; }
        .user { background:gold; color:black; margin-left:auto; }
        .bot { background:#00ff9d; color:black; margin-right:auto; }
        #input-area { display:flex; }
        #user-input { flex:1; padding:12px; border:1px solid #444; border-radius:20px 0 0 20px; background:#1a2235; color:white; }
        button { padding:12px 20px; background:gold; color:black; border:none; border-radius:0 20px 20px 0; cursor:pointer; }
        .footer { text-align:center; margin-top:30px; opacity:0.7; }
    </style>
</head>
<body>

    <h1>TBC Assistant</h1>
    <p class="subtitle">
        Live AI guidance on EU AI Act compliance, Compliance Passports, ethical sourcing, and connecting certified African talent to global remote jobs.
    </p>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input id="user-input" placeholder="Ask about certification, EU AI Act, or remote opportunities..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <p class="footer">
        Back to <a href="index.html" style="color:gold;">Home</a> | Contact: +233 530 105 254 | TalentBridge Compliance © 2026
    </p>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('user-input');

        function addMessage(text, isUser = false) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.textContent = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';

            addMessage("Thinking...", false);

            try {
                const response = await fetch('https://api.poe.com/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-poe-oHzTJOLFM160t013gXmaGyg27da0f5SpUfYq3Sv1PPI'
                    },
                    body: JSON.stringify({
                        bot: 'TBC-Assistant-4.6',
                        messages: [{ role: 'user', content: text }],
                        temperature: 0.7,
                        include_history: false
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Poe API error: ${response.status} - ${errorText}`);
                }

                const data = await response.json();
                const reply = data.reply || "Sorry, no response received.";

                messagesDiv.lastChild.textContent = reply;
            } catch (error) {
                console.error(error);
                messagesDiv.lastChild.textContent = "Connection issue — try again or contact +233 530 105 254.";
            }
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Neutral welcome message (no founder name)
        addMessage("Hi from TBC Assistant. How can I help with Compliance Passports, EU AI Act compliance, ethical sourcing, or connecting certified African talent to global remote jobs today?");
    </script>

</body>
</html>
