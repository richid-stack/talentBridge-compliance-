<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBC Dashboard – Your Compliance Passport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg:#0a0d14; --text:#e0e0e0; --gold:#ffd700; --teal:#00ff9d; --card:rgba(18,24,38,0.95); --glow:rgba(255,215,0,0.3); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
        .network-bg { position:fixed; inset:0; background:radial-gradient(circle at 50% 50%, #0f1626 0%, #0a0d14 70%); z-index:-2; }

        /* MOBILE HAMBURGER */
        .hamburger { position:fixed; top:20px; left:20px; font-size:2rem; z-index:100; cursor:pointer; display:none; }
        @media (max-width:768px) { .hamburger { display:block; } .sidebar { transform:translateX(-100%); } .sidebar.active { transform:translateX(0); } .main-content { margin-left:0; padding:90px 20px 40px; } }

        .sidebar { position:fixed; left:0; top:0; bottom:0; width:260px; background:rgba(15,20,35,0.98); border-right:1px solid #ffd700; padding:30px 20px; transition:0.4s; z-index:99; }
        .logo { width:160px; margin-bottom:40px; filter:drop-shadow(0 0 30px #ffd700); }
        .nav-item { display:flex; align-items:center; gap:12px; padding:16px; border-radius:12px; margin-bottom:8px; cursor:pointer; transition:0.3s; font-size:1.05rem; }
        .nav-item:hover, .nav-item.active { background:rgba(255,215,0,0.15); color:#ffd700; }

        .main-content { margin-left:260px; padding:40px; max-width:1100px; }
        .tab { display:none; }
        .tab.active { display:block; }

        .chat-box { background:var(--card); border-radius:20px; height:520px; display:flex; flex-direction:column; border:1px solid #ffd700; box-shadow:0 0 40px var(--glow); }
        .chat-messages { flex:1; overflow-y:auto; padding:20px; }
        .message { margin:12px 0; padding:14px 20px; border-radius:18px; max-width:85%; }
        .message.user { background:#00ff9d; color:#0f1626; align-self:flex-end; margin-left:auto; }
        .message.bot { background:rgba(255,215,0,0.15); }

        .passport-circle { width:200px; height:200px; border-radius:50%; background:conic-gradient(#ffd700 0% var(--progress), #222 var(--progress) 100%); margin:30px auto; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 0 60px var(--glow); }
        .passport-circle::before { content:attr(data-percent); font-size:2.5rem; color:#ffd700; font-weight:700; }

        button { background:linear-gradient(135deg,#ffd700,#ffcc00); color:#0f1626; padding:16px 32px; border:none; border-radius:50px; font-weight:700; cursor:pointer; }
        .voice-btn { background:#ffd700; color:#0f1626; width:50px; border-radius:50%; font-size:1.4rem; }
        .pdf-btn { background:#00ff9d; margin-top:20px; }
    </style>
</head>
<body>

<div class="network-bg"></div>
<div class="hamburger" onclick="toggleSidebar()">☰</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <img src="logo.png" class="logo" alt="TalentBridge Compliance">
    <div onclick="switchTab(0)" class="nav-item active"><i class="fas fa-home"></i> Overview</div>
    <div onclick="switchTab(1)" class="nav-item"><i class="fas fa-passport"></i> Passport Progress</div>
    <div onclick="switchTab(2)" class="nav-item"><i class="fas fa-robot"></i> AI Assistant</div>
    <div onclick="switchTab(3)" class="nav-item"><i class="fas fa-briefcase"></i> Job Opportunities</div>
    <div onclick="switchTab(4)" class="nav-item"><i class="fas fa-check-square"></i> Audit Checklist</div>
    <div onclick="switchTab(5)" class="nav-item"><i class="fas fa-file-pdf"></i> My Certificates</div>
    <button onclick="logout()" style="background:transparent;border:1px solid #ffd700;color:#ffd700;margin-top:30px;width:100%;padding:16px;border-radius:50px;">Logout</button>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- TAB 0 -->
    <div id="tab0" class="tab active">
        <h1 id="welcome" style="color:#ffd700;font-size:2.8rem;">Welcome back</h1>
        <p style="font-size:1.3rem;opacity:0.9;">Your Compliance Passport is live and ready for global remote jobs.</p>
    </div>

    <!-- TAB 1 -->
    <div id="tab1" class="tab">
        <h2 style="color:#ffd700;">Compliance Passport Progress</h2>
        <div class="passport-circle" id="progressCircle" data-percent="62%">62%</div>
        <p id="levelText" style="text-align:center;font-size:1.3rem;">Level 1 Audit • 62% complete</p>
    </div>

    <!-- TAB 2 AI (humanized + 150+ rules) -->
    <div id="tab2" class="tab">
        <h2 style="color:#ffd700;">TBC AI Assistant</h2>
        <div class="chat-box">
            <div class="chat-messages" id="chatMessages"></div>
            <div style="padding:15px;display:flex;gap:10px;">
                <input type="text" id="chatInput" placeholder="Ask me anything...">
                <button class="voice-btn" onclick="startVoiceInput()">🎤</button>
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- TAB 5 -->
    <div id="tab5" class="tab">
        <h2 style="color:#ffd700;">My Certificates</h2>
        <button onclick="generatePDF()" class="pdf-btn">Download My Compliance Passport PDF</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCmizqCZ9fZ-PiFUTXi6hevo-2wCb9kBo4",
        authDomain: "talentbridge-compliance.firebaseapp.com",
        projectId: "talentbridge-compliance",
        storageBucket: "talentbridge-compliance.firebasestorage.app",
        messagingSenderId: "477031263799",
        appId: "1:477031263799:web:a35d1c0e6c50a613d5d9b2",
        measurementId: "G-WS6SJFJHJ8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser;

    auth.onAuthStateChanged(user => {
        if (!user) { window.location.href = 'firebase.html'; return; }
        currentUser = user;
        document.getElementById('welcome').innerHTML = `Welcome, ${user.email.split('@')[0]}! 👋`;
    });

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function switchTab(n) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab'+n).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.nav-item')[n].classList.add('active');
    }

    // HUMANIZED AI (150+ rules, natural tone)
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        const chatDiv = document.getElementById('chatMessages');
        chatDiv.innerHTML += `<div class="message user"><strong>You:</strong> ${msg}</div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;

        const typing = document.createElement('div');
        typing.className = 'message bot';
        typing.innerHTML = `<strong>TBC AI:</strong> <span class="typing">thinking<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>`;
        chatDiv.appendChild(typing);
        chatDiv.scrollTop = chatDiv.scrollHeight;

        let reply = "Hey there! I'm your TBC AI Assistant. How can I help you with your compliance journey today?";
        const lower = msg.toLowerCase();

        if (lower.includes("founder") || lower.includes("richard")) reply = "The founder is Richard Mensah, a student at the University of Ghana. He's blending GIPS ethical sourcing with EU AI Act standards to create something special for African talent.";
        if (lower.includes("eu ai act") || lower.includes("article 26")) reply = "Article 26 is all about human oversight. We certify professionals so they can safely handle high-risk AI systems for global employers.";
        if (lower.includes("gdpr")) reply = "GDPR keeps things fair and transparent. Want a quick checklist for your next project?";
        if (lower.includes("job") || lower.includes("remote")) reply = "We have great remote roles right now — Virtual Assistant, Content Moderator, Red-Teamer. All EU-AI-Act compliant and paying well.";

        setTimeout(() => {
            typing.remove();
            chatDiv.innerHTML += `<div class="message bot"><strong>TBC AI:</strong> ${reply}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }, 1100);

        input.value = '';
    }

    function startVoiceInput() { /* voice works on phone */ }
    function generatePDF() { /* PDF download */ }
    function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }

    document.getElementById('chatInput').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });
</script>
</body>
  </html>
