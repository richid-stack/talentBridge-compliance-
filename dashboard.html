<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBC Dashboard – Your Compliance Passport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg:#0a0d14; --text:#e0e0e0; --gold:#ffd700; --teal:#00ff9d; --card:rgba(18,24,38,0.95); --glow:rgba(255,215,0,0.3); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
        .network-bg { position:fixed; inset:0; background:radial-gradient(circle at 50% 50%, #0f1626 0%, #0a0d14 70%); z-index:-2; }

        /* MOBILE HAMBURGER */
        .hamburger { position:fixed; top:20px; left:20px; font-size:1.8rem; z-index:100; cursor:pointer; display:none; }
        @media (max-width:768px) { .hamburger { display:block; } .sidebar { transform:translateX(-100%); } .sidebar.active { transform:translateX(0); } .main-content { margin-left:0; padding:80px 20px 40px; } }

        .sidebar { position:fixed; left:0; top:0; bottom:0; width:260px; background:rgba(15,20,35,0.98); border-right:1px solid #ffd700; padding:25px 20px; transition:0.4s; z-index:99; }
        .logo { width:150px; margin-bottom:35px; filter:drop-shadow(0 0 25px #ffd700); }
        .nav-item { display:flex; align-items:center; gap:12px; padding:14px 18px; border-radius:12px; margin-bottom:6px; cursor:pointer; transition:0.3s; font-size:0.98rem; }
        .nav-item:hover, .nav-item.active { background:rgba(255,215,0,0.15); color:#ffd700; }

        .main-content { margin-left:260px; padding:40px; max-width:1100px; }
        .tab { display:none; }
        .tab.active { display:block; }

        .chat-box { background:var(--card); border-radius:20px; height:480px; display:flex; flex-direction:column; border:1px solid #ffd700; box-shadow:0 0 40px var(--glow); }
        .chat-messages { flex:1; overflow-y:auto; padding:18px; }
        .message { margin:10px 0; padding:12px 18px; border-radius:16px; max-width:85%; font-size:0.95rem; }
        .message.user { background:#00ff9d; color:#0f1626; align-self:flex-end; margin-left:auto; }
        .message.bot { background:rgba(255,215,0,0.15); }

        .user-list, .forum-list { max-height:420px; overflow-y:auto; }
        .user-item, .forum-post { padding:12px 16px; border-bottom:1px solid rgba(255,215,0,0.1); cursor:pointer; font-size:0.95rem; }
        .user-item:hover, .forum-post:hover { background:rgba(255,215,0,0.1); }

        .passport-circle { width:180px; height:180px; border-radius:50%; background:conic-gradient(#ffd700 0% var(--progress), #222 var(--progress) 100%); margin:25px auto; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 0 50px var(--glow); }
        .passport-circle::before { content:attr(data-percent); font-size:2.2rem; color:#ffd700; font-weight:700; }

        button { background:linear-gradient(135deg,#ffd700,#ffcc00); color:#0f1626; padding:14px 28px; border:none; border-radius:50px; font-weight:700; cursor:pointer; font-size:0.98rem; }
        .voice-btn { background:#ffd700; color:#0f1626; width:46px; border-radius:50%; font-size:1.3rem; }
        .pdf-btn { background:#00ff9d; margin-top:20px; }
        .qr-code { width:180px; height:180px; background:#fff; margin:20px auto; border:8px solid #ffd700; border-radius:8px; }
    </style>
</head>
<body>

<div class="network-bg"></div>
<div class="hamburger" onclick="toggleSidebar()">☰</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <img src="logo.png" class="logo" alt="TalentBridge Compliance">
    <div onclick="switchTab(0)" class="nav-item active"><i class="fas fa-home"></i> Overview</div>
    <div onclick="switchTab(1)" class="nav-item"><i class="fas fa-passport"></i> Passport Progress</div>
    <div onclick="switchTab(2)" class="nav-item"><i class="fas fa-robot"></i> AI Assistant</div>
    <div onclick="switchTab(3)" class="nav-item"><i class="fas fa-briefcase"></i> Smart Job Board</div>
    <div onclick="switchTab(4)" class="nav-item"><i class="fas fa-check-square"></i> Audit Checklist</div>
    <div onclick="switchTab(5)" class="nav-item"><i class="fas fa-users"></i> Talent Directory</div>
    <div onclick="switchTab(6)" class="nav-item"><i class="fas fa-comments"></i> Network Chat</div>
    <div onclick="switchTab(7)" class="nav-item"><i class="fas fa-comments-dots"></i> Community Forum</div>
    <div onclick="switchTab(8)" class="nav-item"><i class="fas fa-file-pdf"></i> My Certificates</div>
    <button onclick="logout()" style="background:transparent;border:1px solid #ffd700;color:#ffd700;margin-top:30px;width:100%;padding:16px;border-radius:50px;">Logout</button>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- TAB 0-4 (your existing tabs kept intact) -->
    <!-- ... Overview, Passport, AI, Job Board, Checklist ... -->

    <!-- NEW TAB 5: TALENT DIRECTORY -->
    <div id="tab5" class="tab">
        <h2 style="color:#ffd700;">Talent Directory</h2>
        <div class="user-list" id="directoryList"></div>
    </div>

    <!-- NEW TAB 6: NETWORK CHAT -->
    <div id="tab6" class="tab">
        <h2 style="color:#ffd700;">Network Chat</h2>
        <div class="chat-box">
            <div class="chat-messages" id="chatMessages"></div>
            <div style="padding:12px;display:flex;gap:8px;">
                <input type="text" id="chatInput" placeholder="Message the network...">
                <button onclick="sendNetworkMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- NEW TAB 7: COMMUNITY FORUM -->
    <div id="tab7" class="tab">
        <h2 style="color:#ffd700;">Community Forum</h2>
        <div class="forum-list" id="forumPosts"></div>
        <input type="text" id="forumInput" placeholder="Share a tip or question..." style="width:100%;margin-top:15px;padding:14px;">
        <button onclick="postToForum()">Post</button>
    </div>

    <!-- NEW TAB 8: MY CERTIFICATES (with QR) -->
    <div id="tab8" class="tab">
        <h2 style="color:#ffd700;">My Certificates</h2>
        <button onclick="generatePDF()" class="pdf-btn">Download PDF Passport</button>
        <div class="qr-code" id="qrDisplay"></div>
        <button onclick="generateQR()">Generate Shareable QR Code</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
    // Your exact Firebase config
    const firebaseConfig = { /* your keys */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser;

    auth.onAuthStateChanged(user => {
        if (!user) { window.location.href = 'firebase.html'; return; }
        currentUser = user;
        loadDirectory();
        loadForum();
    });

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function switchTab(n) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab'+n).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.nav-item')[n].classList.add('active');
    }

    // Talent Directory
    async function loadDirectory() {
        const snapshot = await db.collection('users').get();
        const container = document.getElementById('directoryList');
        container.innerHTML = '';
        snapshot.forEach(doc => {
            if (doc.data().email !== currentUser.email) {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<strong>${doc.data().email.split('@')[0]}</strong>`;
                div.onclick = () => alert(`Message request sent to ${doc.data().email}`);
                container.appendChild(div);
            }
        });
    }

    // Network Chat (global room for simplicity)
    function sendNetworkMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        // Save to global chat collection
        db.collection('network-chat').add({ user: currentUser.email, message: msg, time: new Date() });
        input.value = '';
    }

    // Community Forum
    async function loadForum() {
        const snapshot = await db.collection('forum').orderBy('time', 'desc').get();
        const container = document.getElementById('forumPosts');
        container.innerHTML = '';
        snapshot.forEach(doc => {
            const div = document.createElement('div');
            div.className = 'forum-post';
            div.innerHTML = `<strong>${doc.data().user}</strong>: ${doc.data().message}`;
            container.appendChild(div);
        });
    }

    function postToForum() {
        const input = document.getElementById('forumInput');
        const msg = input.value.trim();
        if (!msg) return;
        db.collection('forum').add({ user: currentUser.email.split('@')[0], message: msg, time: new Date() });
        input.value = '';
        loadForum();
    }

    // Certificate QR
    function generateQR() {
        const qrDiv = document.getElementById('qrDisplay');
        qrDiv.innerHTML = `<p style="text-align:center;padding:20px;background:#fff;color:#000;font-size:0.9rem;">SCAN TO VERIFY<br>${currentUser.email}<br>EU AI Act Compliant</p>`;
    }

    // Your existing AI, PDF, logout functions remain exactly as before
    function sendMessage() { /* your AI code */ }
    function startVoiceInput() { /* voice */ }
    function generatePDF() { /* PDF */ }
    function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
</script>
</body>
</html>
