<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit & Certification – TalentBridge Compliance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0d14;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .network-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #0f1626 0%, #0a0d14 70%);
            z-index: -2;
            pointer-events: none;
        }
        .network-lines {
            position: absolute;
            inset: 0;
            opacity: 0.08;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><filter id="glow"><feGaussianBlur stdDeviation="1.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="15%" cy="25%" r="2" fill="%23ffd700" filter="url(%23glow)"/><circle cx="35%" cy="65%" r="1.8" fill="%23ffd700" filter="url(%23glow)"/><circle cx="75%" cy="45%" r="2.2" fill="%23ffd700" filter="url(%23glow)"/><circle cx="88%" cy="80%" r="1.6" fill="%23ffd700" filter="url(%23glow)"/><line x1="15%" y1="25%" x2="35%" y2="65%" stroke="%23ffd700" stroke-width="0.6" opacity="0.45"/><line x1="35%" y1="65%" x2="75%" y2="45%" stroke="%23ffd700" stroke-width="0.6" opacity="0.45"/><line x1="75%" y1="45%" x2="88%" y2="80%" stroke="%23ffd700" stroke-width="0.6" opacity="0.45"/></svg>') repeat;
            animation: networkPulse 28s infinite alternate ease-in-out;
        }
        @keyframes networkPulse {
            0% { opacity: 0.06; transform: scale(1.01); }
            100% { opacity: 0.13; transform: scale(1.04); }
        }

        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            background: rgba(10,13,20,0.94);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }

        .logo {
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255,215,0,0.4);
        }

        .hero {
            height: 60vh;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
            background: linear-gradient(to bottom, rgba(10,13,20,0.8), rgba(10,13,20,0.95));
            position: relative;
        }

        .hero h1 {
            font-size: 3.2rem;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        .form-section {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(18,24,38,0.92);
            border-radius: 20px;
            box-shadow: 0 20px 70px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,215,0,0.18);
            backdrop-filter: blur(12px);
        }

        .form-section h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        .form-container iframe {
            width: 100%;
            min-height: 1000px;
            border: none;
            border-radius: 16px;
            background: transparent;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .footer {
            text-align: center;
            margin-top: 80px;
            padding: 60px 40px 40px;
            opacity: 0.85;
            font-size: 1rem;
            border-top: 1px solid rgba(255,215,0,0.15);
        }

        .social-icons a {
            color: #ffd700;
            margin: 0 24px;
            font-size: 2.4rem;
            transition: all 0.3s;
        }

        .social-icons a:hover {
            color: #ffea80;
            transform: scale(1.25) rotate(8deg);
        }
    </style>
</head>
<body>

    <div class="network-bg">
        <div class="network-lines"></div>
    </div>

    <nav class="nav">
        <div class="logo">TBC</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Audit & Certification</h1>
        <p style="opacity:0.8; max-width:700px; margin:20px auto;">
            Complete the Level 1 Audit to earn your Compliance Passport — vetted, auditable, secure.
        </p>
    </section>

    <div class="form-section">
        <div class="form-container">
            <iframe 
                src="https://tally.so/r/Ek0aPo?embed=1&align=left&hide-title=1&transparent=1&padding=0" 
                width="100%" 
                height="1000px" 
                frameborder="0" 
                style="border:none; border-radius:16px; background:transparent;">
            </iframe>
        </div>
        <p style="text-align:center; margin-top:30px; color:#ffd700; opacity:0.9;">
            Your data is secure & GDPR-aligned. We'll reach out within 24 hours.
        </p>
    </div>

    <p class="footer">
        Back to <a href="index.html">Home</a> | Contact: +233 530 105 254 | TalentBridge Compliance © 2026
    </p>

</body>
</html>
